<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="favicon.svg">
<title>GameForge+ — Playful Web Studio</title>
<meta name="description" content="GameForge+ is a modern, responsive game website with an engaging canvas game.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css" />
  <style>

  body {

    margin: 0;

    height: 100vh;

    background: url("https://raw.githubusercontent.com/neo-aussie1/IMG/refs/heads/main/bwhale.webp") no-repeat center center;

    background-size: cover;

  }
 
  /* Mobile (max 600px) */

  @media (max-width: 600px) {

    body {

      background-image: url("https://raw.githubusercontent.com/neo-aussie1/IMG/refs/heads/main/bwhale-mob.webp");

    }

  }
 
  /* Tablet (601px – 1024px) */

  @media (min-width: 601px) and (max-width: 1024px) {

    body {

      background-image: url("https://raw.githubusercontent.com/neo-aussie1/IMG/refs/heads/main/bwhale-mob.webp");

    }

  }
 
  /* Desktop (above 1024px) */

  @media (min-width: 1025px) {

    body {

      background-image: url("https://raw.githubusercontent.com/neo-aussie1/IMG/refs/heads/main/bwhale.webp");

    }

  }
</style>
 
</head>
